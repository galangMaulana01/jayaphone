<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;450;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <!-- Eruda - Mobile Console Debug -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <script>
      window.BACKEND_URL = 'https://phonejaya.vercel.app';
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Geist', 'system-ui', 'sans-serif'],
                        mono: ['Geist Mono', 'monospace'],
                    },
                    colors: {
                        sidebar: '#0B0B0D',
                        'sidebar-hover': '#18181B',
                        'sidebar-border': '#202020',
                    },
                    keyframes: {
                        fadeUp: { from: { opacity: 0, transform: 'translateY(10px)' }, to: { opacity: 1, transform: 'translateY(0)' } },
                        fadeIn: { from: { opacity: 0 }, to: { opacity: 1 } },
                        shimmer: { '0%': { backgroundPosition: '200% 0' }, '100%': { backgroundPosition: '-200% 0' } },
                        spin: { to: { transform: 'rotate(360deg)' } },
                        toastIn: { from: { opacity: 0, transform: 'translateX(110%)' }, to: { opacity: 1, transform: 'translateX(0)' } },
                        pulse: { '0%,100%': { opacity: 1 }, '50%': { opacity: 0.4 } },
                    },
                    animation: {
                        'fade-up': 'fadeUp 0.22s cubic-bezier(0.16,1,0.3,1)',
                        'fade-in': 'fadeIn 0.15s ease-out',
                        shimmer: 'shimmer 1.5s ease infinite',
                        spin: 'spin 0.7s linear infinite',
                        toast: 'toastIn 0.3s cubic-bezier(0.16,1,0.3,1)',
                        pulse: 'pulse 2s cubic-bezier(0.4,0,0.6,1) infinite',
                    },
                }
            }
        }
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Geist', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
