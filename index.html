                      <button onclick="document.getElementById('sp-delta').stepUp()" class="btn btn-ghost w-10 flex-shrink-0 text-lg font-bold">+</button>
                    </div>
                    <p class="text-[11px] dark:text-zinc-500 text-zinc-400 mt-1.5">Positif = tambah stok, negatif = kurangi stok</p>
                  </div>
                  <div><label class="label">Catatan</label>
                    <input id="sp-delta-catatan" type="text" class="${input}" placeholder="Alasan perubahan stok..."/></div>
                </div>
                <button id="btn-update-stok-sp" onclick="updateStokSP('${sp_id}')" class="btn btn-primary w-full mt-5">Simpan Perubahan</button>`);
        }

        async function updateStokSP(sp_id) {
            const btn   = document.getElementById('btn-update-stok-sp');
            const delta = parseInt(document.getElementById('sp-delta').value) || 0;
            if (delta === 0) { showToast('Perubahan stok tidak boleh 0', 'error'); return; }
            btn.innerHTML = `<span class="spinner"></span> Menyimpan...`;
            btn.disabled  = true;
            try {
                await API.sparepart.updateStok(sp_id, {
                    delta,
                    catatan: document.getElementById('sp-delta-catatan').value,
                });
                closeModalBtn();
                showToast('Stok berhasil diupdate');
                await renderSparepart();
            } catch (e) { showToast(e.message, 'error'); btn.innerHTML = 'Simpan Perubahan'; btn.disabled = false; }
        }

        // ═══ VIEW: MANAJEMEN CABANG (Owner only) ═══
        async function renderCabang() {
            const c = document.getElementById('view-container');
            setLoading(c, 3);
            try {
                const list = (await API.cabang.list()).data;
                c.innerHTML = `<div class="space-y-5">
                  <div class="flex items-center justify-between">
                    <p class="text-xs dark:text-zinc-500 text-zinc-400">${list.length} cabang terdaftar</p>
                    <button onclick="modalTambahCabang()" class="btn btn-primary" style="height:36px;padding:0 16px;font-size:0.75rem;">+ Tambah Cabang</button>
                  </div>
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    ${list.length ? list.map(cab => `
                    <div class="panel rounded-2xl p-5 space-y-3">
                      <div class="flex items-start justify-between">
                        <div>
                          <div class="flex items-center gap-2">
                            <span class="text-xs font-mono font-bold dark:text-zinc-300 text-zinc-600 dark:bg-zinc-800 bg-zinc-100 px-2 py-0.5 rounded-lg">${cab.kode}</span>
                            <span class="${cab.aktif ? 'text-emerald-400' : 'text-red-400'} text-[11px]">● ${cab.aktif ? 'Aktif' : 'Nonaktif'}</span>
                          </div>
                          <p class="text-sm font-semibold dark:text-zinc-100 text-zinc-800 mt-1">${cab.nama}</p>
                          <p class="text-[11px] dark:text-zinc-500 text-zinc-400">${cab.alamat || '—'}</p>
                          <p class="text-[11px] dark:text-zinc-500 text-zinc-400">${cab.telp || '—'}</p>
                        </div>
                        <div class="text-right flex-shrink-0 ml-3">
                          <p class="text-[11px] dark:text-zinc-500 text-zinc-400">Karyawan</p>
                          <p class="text-lg font-bold dark:text-zinc-100 text-zinc-800">${cab.jumlah_karyawan}</p>
                        </div>
                      </div>
                      <div class="pt-3 border-t dark:border-zinc-800 border-zinc-100">
                        <p class="text-[11px] dark:text-zinc-500 text-zinc-400 mb-1">Kepala Cabang</p>
                        ${cab.kepala_cabang
                          ? `<div class="flex items-center gap-2">
                              <div class="w-6 h-6 rounded-full dark:bg-teal-500/20 bg-teal-100 flex items-center justify-center text-[10px] font-bold text-teal-500">${cab.kepala_cabang[0]}</div>
                              <div>
                                <p class="text-xs font-medium dark:text-zinc-200 text-zinc-700">${cab.kepala_cabang}</p>
                                <p class="text-[10px] dark:text-zinc-500 text-zinc-400">@${cab.kepala_username}</p>
                              </div>
                            </div>`
                          : `<p class="text-xs text-amber-400">⚠ Belum ada kepala cabang</p>`
                        }
                      </div>
                      <div class="flex gap-2 pt-1">
                        <button onclick="modalAssignKepala('${cab.kode}','${cab.nama}')" class="btn btn-ghost flex-1 text-xs" style="height:32px;">
                          ${cab.kepala_cabang ? '↻ Ganti Kepala' : '+ Set Kepala'}
                        </button>
                        <button onclick="modalEditCabang('${cab.kode}','${cab.nama}','${cab.alamat||''}','${cab.telp||''}')" class="btn btn-ghost text-xs" style="height:32px;padding:0 12px;">Edit</button>
                        ${cab.aktif
                          ? `<button onclick="toggleAktifCabang('${cab.kode}',false)" class="btn btn-ghost text-xs text-red-400 dark:hover:bg-red-500/10" style="height:32px;padding:0 12px;">Nonaktifkan</button>`
                          : `<button onclick="toggleAktifCabang('${cab.kode}',true)" class="btn btn-ghost text-xs text-emerald-400" style="height:32px;padding:0 12px;">Aktifkan</button>`
                        }
                      </div>
                    </div>`).join('') : `<div class="col-span-2">${emptyState('Belum ada cabang terdaftar', '🏢')}</div>`}
                  </div>
                </div>`;
            } catch (e) { c.innerHTML = errorState(e.message, 'renderCabang()'); }
        }

        function modalTambahCabang() {
            openModal(`${modalHeader('Tambah Cabang')}
                <div class="space-y-3">
                  <div class="grid grid-cols-2 gap-3">
                    <div><label class="label">Nama Cabang <span class="text-red-400">*</span></label>
                      <input id="cab-nama" type="text" class="${input}" placeholder="Cabang Bandung"/></div>
                    <div><label class="label">Kode <span class="text-red-400">*</span></label>
                      <input id="cab-kode" type="text" class="${input}" placeholder="BDG" maxlength="5" style="text-transform:uppercase"/></div>
                  </div>
                  <div><label class="label">Alamat</label>
                    <input id="cab-alamat" type="text" class="${input}" placeholder="Jl. Contoh No. 1..."/></div>
                  <div><label class="label">No. Telp</label>
                    <input id="cab-telp" type="text" class="${input}" placeholder="08xx-xxxx-xxxx"/></div>
                </div>
                <button id="btn-simpan-cab" onclick="simpanCabang()" class="btn btn-primary w-full mt-5">Simpan Cabang</button>`);
        }

        async function simpanCabang() {
            const btn   = document.getElementById('btn-simpan-cab');
            const nama  = document.getElementById('cab-nama').value.trim();
            const kode  = document.getElementById('cab-kode').value.trim().toUpperCase();
            if (!nama || !kode) { showToast('Nama dan Kode wajib diisi', 'error'); return; }
            btn.innerHTML = `<span class="spinner"></span> Menyimpan...`; btn.disabled = true;
            try {
                await API.cabang.create({ nama, kode, alamat: document.getElementById('cab-alamat').value, telp: document.getElementById('cab-telp').value });
                closeModalBtn(); showToast(`Cabang ${kode} berhasil ditambahkan`); await renderCabang();
            } catch (e) { showToast(e.message, 'error'); btn.innerHTML = 'Simpan Cabang'; btn.disabled = false; }
        }

        function modalEditCabang(kode, nama, alamat, telp) {
            openModal(`${modalHeader('Edit Cabang', kode)}
                <div class="space-y-3">
                  <div><label class="label">Nama Cabang</label>
                    <input id="edit-cab-nama" type="text" class="${input}" value="${nama}"/></div>
                  <div><label class="label">Alamat</label>
                    <input id="edit-cab-alamat" type="text" class="${input}" value="${alamat}"/></div>
                  <div><label class="label">No. Telp</label>
                    <input id="edit-cab-telp" type="text" class="${input}" value="${telp}"/></div>
                </div>
                <button id="btn-edit-cab" onclick="updateCabang('${kode}')" class="btn btn-primary w-full mt-5">Simpan Perubahan</button>`);
        }

        async function updateCabang(kode) {
            const btn = document.getElementById('btn-edit-cab');
            btn.innerHTML = `<span class="spinner"></span>`; btn.disabled = true;
            try {
                await API.cabang.update(kode, {
                    nama:   document.getElementById('edit-cab-nama').value,
                    alamat: document.getElementById('edit-cab-alamat').value,
                    telp:   document.getElementById('edit-cab-telp').value,
                });
                closeModalBtn(); showToast('Cabang berhasil diupdate'); await renderCabang();
            } catch (e) { showToast(e.message, 'error'); btn.innerHTML = 'Simpan Perubahan'; btn.disabled = false; }
        }

        async function toggleAktifCabang(kode, aktif) {
            if (!confirm(`${aktif ? 'Aktifkan' : 'Nonaktifkan'} cabang ${kode}?`)) return;
            try {
                await API.cabang.update(kode, { aktif });
                showToast(`Cabang ${kode} ${aktif ? 'diaktifkan' : 'dinonaktifkan'}`);
                await renderCabang();
            } catch (e) { showToast(e.message, 'error'); }
        }

        function modalAssignKepala(kode, nama_cabang) {
            openModal(`${modalHeader('Set Kepala Cabang', nama_cabang)}
                <div class="space-y-3">
                  <div class="p-3 rounded-xl dark:bg-amber-500/8 bg-amber-50 border dark:border-amber-500/15 border-amber-200">
                    <p class="text-xs dark:text-amber-400 text-amber-700">Kepala cabang lama akan dinonaktifkan otomatis jika ada.</p>
                  </div>
                  <div><label class="label">Nama Lengkap <span class="text-red-400">*</span></label>
                    <input id="kc-nama" type="text" class="${input}" placeholder="Nama kepala cabang"/></div>
                  <div><label class="label">Username <span class="text-red-400">*</span></label>
                    <input id="kc-user" type="text" class="${input}" placeholder="username_login" autocomplete="off"/></div>
                  <div><label class="label">Password <span class="text-red-400">*</span></label>
                    <div class="relative">
                      <input id="kc-pass" type="password" class="${input} pr-10" placeholder="Min. 6 karakter" autocomplete="new-password"/>
                      <button type="button" onclick="togglePwVisibility('kc-pass','kc-eye')" class="absolute right-3 top-1/2 -translate-y-1/2 dark:text-zinc-500 text-zinc-400">
                        <svg id="kc-eye" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                      </button>
                    </div>
                  </div>
                </div>
                <button id="btn-assign-kc" onclick="simpanKepalaCabang('${kode}')" class="btn btn-primary w-full mt-5">Set sebagai Kepala Cabang</button>`);
        }

        async function simpanKepalaCabang(kode) {
            const btn  = document.getElementById('btn-assign-kc');
            const nama = document.getElementById('kc-nama').value.trim();
            const user = document.getElementById('kc-user').value.trim();
            const pass = document.getElementById('kc-pass').value;
            if (!nama || !user || !pass) { showToast('Semua field wajib diisi', 'error'); return; }
            if (pass.length < 6) { showToast('Password minimal 6 karakter', 'error'); return; }
            btn.innerHTML = `<span class="spinner"></span> Menyimpan...`; btn.disabled = true;
            try {
                await API.cabang.assignKepala(kode, { nama, username: user, password: pass });
                closeModalBtn(); showToast(`Kepala cabang ${kode} berhasil diset`); await renderCabang();
            } catch (e) { showToast(e.message, 'error'); btn.innerHTML = 'Set sebagai Kepala Cabang'; btn.disabled = false; }
        }

        // ═══ NOTIFIKASI REAL-TIME (Polling) ═══
        const NOTIF = {
            _items: JSON.parse(localStorage.getItem('jyp_notif') || '[]'),
            _interval: null,
            _seen: new Set(JSON.parse(localStorage.getItem('jyp_notif_seen') || '[]')),

            save() {
                localStorage.setItem('jyp_notif', JSON.stringify(this._items.slice(0, 30)));
                localStorage.setItem('jyp_notif_seen', JSON.stringify([...this._seen].slice(0, 100)));
            },

            add(item) {
                // Cegah duplikat berdasarkan service_id
                if (this._seen.has(item.id)) return false;
                this._seen.add(item.id);
                this._items.unshift({ ...item, ts: Date.now() });
                this.save();
                return true;
            },

            count() {
                return this._items.filter(n => !n.read).length;
            },

            markAllRead() {
                this._items.forEach(n => n.read = true);
                this.save();
                this.updateBadge();
                this.renderList();
            },

            clear() {
                this._items = [];
                this.save();
                this.updateBadge();
                this.renderList();
            },

            updateBadge() {
                const badge = document.getElementById('notif-badge');
                const count = this.count();
                if (!badge) return;
                if (count > 0) {
                    badge.textContent = count > 9 ? '9+' : count;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            },

            renderList() {
                const el = document.getElementById('notif-list');
                if (!el) return;
                if (!this._items.length) {
                    el.innerHTML = '<div class="px-4 py-6 text-center text-xs dark:text-zinc-600 text-zinc-400">Tidak ada notifikasi</div>';
                    return;
                }
                el.innerHTML = this._items.map(n => `
                  <div class="px-4 py-3 ${n.read ? '' : 'dark:bg-teal-500/5 bg-teal-50/60'} hover:dark:bg-zinc-800/60 hover:bg-zinc-50 transition-colors cursor-pointer" onclick="handleNotifClick('${n.page||''}')">
                    <div class="flex items-start gap-2.5">
                      <div class="w-7 h-7 rounded-xl flex items-center justify-center flex-shrink-0 mt-0.5 ${n.type === 'approval' ? 'bg-amber-500/10' : 'bg-teal-500/10'}">
                        ${n.type === 'approval'
                          ? '<svg class="w-3.5 h-3.5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
                          : '<svg class="w-3.5 h-3.5 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'}
                      </div>
                      <div class="flex-1 min-w-0">
                        <p class="text-xs font-medium dark:text-zinc-200 text-zinc-700 leading-tight">${n.title}</p>
                        <p class="text-[11px] dark:text-zinc-500 text-zinc-400 mt-0.5 leading-tight">${n.body}</p>
                        <p class="text-[10px] dark:text-zinc-600 text-zinc-300 mt-1">${_timeAgo(n.ts)}</p>
                      </div>
                      ${!n.read ? '<div class="w-1.5 h-1.5 rounded-full bg-teal-400 flex-shrink-0 mt-1.5"></div>' : ''}
                    </div>
                  </div>`).join('');
            },

            async poll() {
                // Hanya polling untuk role kasir & owner yang bisa approve
                const role = STATE.user?.role;
                if (!role || role === 'teknisi') return;
                try {
                    const res = await API.service.pendingApproval({ limit: 50 });
                    const list = res.data || [];
                    let newCount = 0;
                    for (const svc of list) {
                        const added = this.add({
                            id:    svc.service_id,
                            type:  'approval',
                            title: 'Service Selesai — Butuh Approval',
                            body:  `${svc.unit_label || svc.unit_id} · ${svc.keluhan || ''}`,
                            page:  'approval-repair',
                        });
                        if (added) newCount++;
                    }
                    if (newCount > 0) {
                        showToast(`🔔 ${newCount} tiket service selesai, menunggu approval`, 'info');
                    }
                    this.updateBadge();
                } catch (e) {
                    // Silent fail - polling tidak boleh ganggu UI
                }
            },

            start() {
                this.updateBadge();
                this.renderList();
                // Poll langsung pertama kali, lalu setiap 30 detik
                this.poll();
                this._interval = setInterval(() => this.poll(), 30000);
            },

            stop() {
                if (this._interval) { clearInterval(this._interval); this._interval = null; }
            },
        };

        function _timeAgo(ts) {
            const diff = Math.floor((Date.now() - ts) / 1000);
            if (diff < 60) return 'Baru saja';
            if (diff < 3600) return `${Math.floor(diff/60)} menit lalu`;
            if (diff < 86400) return `${Math.floor(diff/3600)} jam lalu`;
            return `${Math.floor(diff/86400)} hari lalu`;
        }

        function toggleNotifPanel() {
            const panel = document.getElementById('notif-panel');
            const isHidden = panel.classList.contains('hidden');
            panel.classList.toggle('hidden', !isHidden);
            if (isHidden) {
                NOTIF.markAllRead();
                NOTIF.renderList();
                // Tutup kalau klik di luar
                setTimeout(() => {
                    document.addEventListener('click', function _close(e) {
                        if (!document.getElementById('notif-wrapper')?.contains(e.target)) {
                            panel.classList.add('hidden');
                            document.removeEventListener('click', _close);
                        }
                    });
                }, 50);
            }
        }

        function handleNotifClick(page) {
            if (page) navigate(page);
            document.getElementById('notif-panel')?.classList.add('hidden');
        }

        function clearNotif() { NOTIF.clear(); }

        // ═══ INIT ═══
        (async () => {
            const token = Token.get();
            if (token) {
                try {
                    const res = await API.auth.me();
                    STATE.user = res.data;
                    showApp();
                } catch { Token.clear(); }
            }
        })();
    </script>
</body>
</html>
